<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .price {
            font-weight: bold;
            color: #28a745;
        }
        .stock-low {
            color: #dc3545;
        }
        .stock-ok {
            color: #28a745;
        }
    </style>
</head>
<body>
    <h1>Product Inventory</h1>
    <table id="product-table">
        <thead>
            <tr>
                <th>ID</th>
                <th class="name">Name</th>
                <th class="price">Price</th>
                <th class="stock">Stock</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td class="name">Widget A</td>
                <td class="price">$29.99</td>
                <td class="stock stock-ok">150</td>
            </tr>
            <tr>
                <td>2</td>
                <td class="name">Gadget B</td>
                <td class="price">$49.99</td>
                <td class="stock stock-low">5</td>
            </tr>
            <tr>
                <td>3</td>
                <td class="name">Tool C</td>
                <td class="price">$15.50</td>
                <td class="stock stock-ok">89</td>
            </tr>
            <tr>
                <td>4</td>
                <td class="name">Device D</td>
                <td class="price">$199.00</td>
                <td class="stock stock-ok">42</td>
            </tr>
            <tr>
                <td>5</td>
                <td class="name">Component E</td>
                <td class="price">$8.25</td>
                <td class="stock stock-low">3</td>
            </tr>
        </tbody>
    </table>
    <div id="summary">
        <p>Total products: <span id="total-count">5</span></p>
        <p>Total value: <span id="total-value">$302.73</span></p>
    </div>
</body>
</html>
