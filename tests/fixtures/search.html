<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .search-container {
            display: flex;
            gap: 10px;
        }
        #search-box {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #search-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #search-btn:hover {
            background-color: #0056b3;
        }
        #results {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 100px;
        }
        .result-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h1>Search Test Page</h1>
    <div class="search-container">
        <input id="search-box" type="text" placeholder="Enter search query...">
        <button id="search-btn">Search</button>
    </div>
    <div id="results">
        <p class="result-item">Results will appear here...</p>
    </div>
    <script>
        document.getElementById('search-btn').addEventListener('click', function() {
            const query = document.getElementById('search-box').value;
            const resultsDiv = document.getElementById('results');
            if (query) {
                resultsDiv.innerHTML = '<p class="result-item">Searching for: ' + query + '</p>' +
                    '<p class="result-item">Result 1 for "' + query + '"</p>' +
                    '<p class="result-item">Result 2 for "' + query + '"</p>' +
                    '<p class="result-item">Result 3 for "' + query + '"</p>';
            }
        });
        document.getElementById('search-box').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('search-btn').click();
            }
        });
    </script>
</body>
</html>
